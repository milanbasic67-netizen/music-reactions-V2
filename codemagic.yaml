workflows:
  ios-capacitor:
    name: DuetApp iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default
      # Code signing variables — set these in Codemagic dashboard
      # Team → Environment variables:
      #   APP_STORE_CONNECT_ISSUER_ID
      #   APP_STORE_CONNECT_KEY_IDENTIFIER
      #   APP_STORE_CONNECT_PRIVATE_KEY
      #   CERTIFICATE_PRIVATE_KEY
      groups:
        - app_store_connect

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Add iOS platform (first time only)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: cd ios/App && pod install

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.duetapp.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      # Uncomment to auto-publish to TestFlight after build
      # app_store_connect:
      #   auth: integration
      #   submit_to_testflight: true

      email:
        recipients:
          - milanbasic67@gmail.com
        notify:
          success: true
          failure: true
